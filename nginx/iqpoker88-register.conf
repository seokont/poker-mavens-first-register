# Nginx config for iqpoker88 registration app (Next.js on port 3010)
#
# Install on Ubuntu/Debian:
#   sudo cp nginx/iqpoker88-register.conf /etc/nginx/sites-available/iqpoker88-register
#   sudo ln -s /etc/nginx/sites-available/iqpoker88-register /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL (after DNS points to this server):
#   sudo certbot --nginx -d register.iqpoker88.com

upstream iqpoker88_register {
    server 127.0.0.1:3010;
    keepalive 64;
}

# HTTP — redirect to HTTPS (enable after SSL is ready)
server {
    listen 80;
    listen [::]:80;
    server_name register.iqpoker88.com;

    # Uncomment after first certbot run:
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://iqpoker88_register;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

