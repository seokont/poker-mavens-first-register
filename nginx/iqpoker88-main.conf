# Nginx config if the app is on the main domain iqpoker88.com
# Use ONLY if Poker Mavens is on another port/path on the same server.
# Otherwise prefer register.iqpoker88.com (see iqpoker88-register.conf).

upstream iqpoker88_register {
    server 127.0.0.1:3010;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name iqpoker88.com www.iqpoker88.com;

    location / {
        proxy_pass http://iqpoker88_register;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
